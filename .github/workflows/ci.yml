name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 6 * * 0"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff
        run: uv run ruff check src tests

      - name: Pytest (fast)
        run: uv run pytest -q -m "not slow"

      - name: Verify held-out integrity
        run: bash scripts/verify_holdout.sh

  calibration-weekly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Day 12b evaluator calibration gate
        run: uv run pytest -q -m calibration

      - name: Holdout H1-H5 accuracy gate
        run: uv run python scripts/holdout_accuracy_gate.py

      - name: Hybrid vs surrogate-only A/B (P1.3)
        run: uv run pytest -q tests/physics/test_hybrid_heldout_ab.py

      - name: Lap-time Spearman correlation gate (P1.2)
        run: uv run python scripts/lap_time_correlation_gate.py

      - name: Verify held-out integrity
        run: bash scripts/verify_holdout.sh
