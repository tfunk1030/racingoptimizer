name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "0 6 * * 0"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      # No LFS on the per-PR job: the repo's LFS bandwidth budget is finite
      # and the multi-GB ibtfiles set burned through it (AUDIT.md N5).
      # tests/conftest.py skips corpus-gated tests when fixtures are
      # unmaterialised LFS pointers, so the fast suite stays meaningful.
      # Full-data checks (holdout integrity, accuracy gates) run weekly below.
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff
        run: uv run ruff check src tests

      - name: Pytest (fast)
        run: uv run pytest -q -m "not slow"

  calibration-weekly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    # The gates refit per-car models (~15 min/car) and the LOSO loop is
    # heavier still; cap below the 6 h hosted-runner job limit.
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      # Every gate below needs corpus/catalog.sqlite + parquet sessions.
      # Without this step they all skip/short-circuit and the job passes
      # while measuring nothing (AUDIT.md H1 — the weekly gates had never
      # actually run in CI).
      - name: Build corpus from telemetry
        run: uv run optimize learn ./ibtfiles

      # A fresh ingest writes held_out=0; re-apply the gate-only flags from
      # the manifest BEFORE any gate fits, or the per-car models train on
      # the held-out IBTs (leak).
      - name: Flag held-out sessions gate-only
        run: uv run python scripts/mark_holdout_sessions.py

      - name: Verify held-out integrity
        run: bash scripts/verify_holdout.sh

      - name: Day 12b evaluator calibration gate
        run: uv run pytest -q -m calibration

      - name: Holdout H1-H5 accuracy gate
        run: uv run python scripts/holdout_accuracy_gate.py

      - name: Hybrid vs surrogate-only A/B (P1.3)
        run: uv run pytest -q tests/physics/test_hybrid_heldout_ab.py

      - name: Lap-time Spearman correlation gate (P1.2)
        run: uv run python scripts/lap_time_correlation_gate.py

      # Persist the evidence JSONs even when a gate fails or the job
      # times out — without this the results evaporated with the runner.
      - name: Upload accuracy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-evidence-${{ github.run_id }}
          path: docs/physics-rebuild/*.json
          if-no-files-found: warn
